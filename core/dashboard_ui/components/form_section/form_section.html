<div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-6 h-full flex flex-col overflow-hidden">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-5">
        <div class="flex flex-wrap gap-2 bg-slate-900/70 rounded-full p-1">
            <button id="form-tab-location-btn" type="button" onclick="switchFormTab('location')" class="text-slate-100 bg-cyan-500/15 hover:bg-cyan-500/20 rounded-full px-4 py-2 text-sm font-semibold transition">📁 儲物空間</button>
            <button id="form-tab-object-btn" type="button" onclick="switchFormTab('object')" class="text-slate-300 hover:text-white rounded-full px-4 py-2 text-sm font-semibold transition">⚡ 物資登錄</button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden">
        <div id="form-tab-location" class="space-y-4 h-full flex flex-col overflow-hidden">
            <div class="flex-1 overflow-y-auto space-y-4 pr-1">
                <div class="flex flex-col gap-2">
                    <h3 id="loc-form-title" class="text-sm font-semibold text-slate-300" data-i18n="loc_add_title">📁 新增儲物空間</h3>
                    <input id="new-loc-name" type="text" data-i18n-placeholder="loc_name_placeholder" placeholder="空間名稱 (如: 抽屜 A)" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white w-full">
                    <div id="loc-parent-wrapper" class="hidden flex flex-col gap-1">
                        <label class="text-xs text-slate-400 font-mono" data-i18n="loc_parent_label">變更父級空間 ID (留空代表改為根空間)</label>
                        <input id="new-loc-parent-id" type="number" data-i18n-placeholder="loc_parent_placeholder" placeholder="父空間 ID (如: 1)" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none w-full">
                    </div>
                    <input id="editing-location-id" type="hidden" value="">
                </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-2">
                <button id="loc-submit-btn" onclick="submitLocation()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-semibold py-3 rounded-xl text-sm transition" data-i18n="loc_btn_create">建立空間</button>
                <button id="loc-cancel-btn" onclick="cancelLocationEditMode()" class="hidden bg-slate-700 hover:bg-slate-600 text-slate-200 py-3 rounded-xl text-sm transition" data-i18n="btn_cancel">取消</button>
            </div>
        </div>

        <div id="form-tab-object" class="hidden space-y-4 h-full flex flex-col overflow-hidden">
            <div class="flex-1 overflow-y-auto space-y-4 pr-1">
                <div class="flex flex-col gap-2">
                    <h3 id="form-action-title" class="text-sm font-semibold text-slate-300" data-i18n="obj_add_title">⚡ 外掛模板動態登錄 (新增模式)</h3>
                    <select id="template-selector" onchange="renderDynamicForm()" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-sm text-white focus:outline-none w-full"></select>
                    <input id="new-obj-name" type="text" data-i18n-placeholder="obj_name_placeholder" placeholder="物品自訂名稱 (如: 綠色扁線)" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none w-full">
                    <input id="editing-object-id" type="hidden" value="">
                </div>
                <div id="dynamic-form-fields" class="mt-1 space-y-3"></div>
            </div>
            <div class="flex flex-col sm:flex-row gap-2">
                <button id="submit-btn" onclick="submitObject()" class="flex-1 bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold py-3 rounded-xl text-sm transition" data-i18n="obj_btn_save">入庫校驗並存檔</button>
                <button id="cancel-edit-btn" onclick="cancelEditMode()" class="hidden bg-slate-700 hover:bg-slate-600 text-slate-200 py-3 rounded-xl text-sm transition" data-i18n="btn_cancel">取消</button>
            </div>
        </div>
    </div>
</div>
