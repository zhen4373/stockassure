<!DOCTYPE html>
<html lang="zh-TW" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockAssure 控制台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.5);
            --border-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --theme-emerald: #10b981;
            --theme-cyan: #06b6d4;
        }
        body { background-color: var(--bg-main); color: var(--text-main); }
        .custom-card { background-color: var(--bg-card); border: 1px solid var(--border-card); }
    </style>
</head>
<body class="h-full flex flex-col font-sans antialiased selection:bg-cyan-500/30 selection:text-cyan-200">

    <header id="header-root" class="border-b border-slate-800/80 bg-slate-900/40 backdrop-blur-md sticky top-0 z-50 h-16"></header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-8 overflow-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-stretch">
            <div id="tree-section-root" class="custom-card rounded-2xl p-6 min-h-[260px] lg:min-h-[400px] max-h-[600px] overflow-hidden"></div>
            <div id="form-section-root" class="lg:col-span-2 min-h-[260px] lg:min-h-[400px] max-h-[600px] overflow-hidden"></div>
        </div>
        <div id="list-section-root" class="custom-card rounded-2xl p-6 min-h-[260px] lg:min-h-[400px] max-h-[55vh] overflow-hidden"></div>
    </main>

    <script>
        let CURRENT_LANG = 'zh-TW';
        try {
            const savedLang = localStorage.getItem('stockassure_lang');
            if (savedLang) CURRENT_LANG = savedLang;
        } catch (e) {
            // ignore (localStorage not available)
        }
        let systemLocales = {};
        let currentSelectedLocationId = null;
        let templatesMeta = {};

        // 系統架構初始化引擎 (API 皆已移除 v1)
        async function initSystem() {
            try {
                const sysConfigRes = await fetch('/api/system/config');
                if (sysConfigRes.ok) {
                    // 只有在使用者尚未有本地偏好時才採用後端系統語言
                    try {
                        const savedLang = localStorage.getItem('stockassure_lang');
                        if (!savedLang) {
                            const sysConfig = await sysConfigRes.json();
                            if (sysConfig.language === "Chinese Traditional") {
                                CURRENT_LANG = 'zh-TW';
                            } else {
                                CURRENT_LANG = 'en-GB';
                            }
                        }
                    } catch (e) {
                        const sysConfig = await sysConfigRes.json();
                        if (sysConfig.language === "Chinese Traditional") {
                            CURRENT_LANG = 'zh-TW';
                        } else {
                            CURRENT_LANG = 'en-GB';
                        }
                    }
                }

                const uiRes = await fetch('/ui_config.json');
                if (uiRes.ok) {
                    const uiConfig = await uiRes.json();
                    for (const [key, value] of Object.entries(uiConfig.styles)) {
                        document.documentElement.style.setProperty(key, value);
                    }
                }

                await Promise.all([
                    loadComponent('header', '#header-root'),
                    loadComponent('tree_section', '#tree-section-root'),
                    loadComponent('form_section', '#form-section-root'),
                    loadComponent('list_section', '#list-section-root')
                ]);
                        // 確保語系選單反映目前系統語言
                        const langEl = document.getElementById('lang-selector');
                        if (langEl) langEl.value = CURRENT_LANG;

                        await fetchTemplates();
                        await fetchTree();
                
            } catch (err) {
                console.error("❌ StockAssure 模組化引擎初始化失敗:", err);
            }
        }

        async function loadComponent(name, rootSelector) {
            const [htmlRes, langRes] = await Promise.all([
                fetch(`/components/${name}/${name}.html`),
                fetch(`/components/${name}/language.json`)
            ]);

            if (!htmlRes.ok || !langRes.ok) {
                console.error(`無法載入組件: ${name}`);
                return;
            }

            const htmlText = await htmlRes.text();
            const langJson = await langRes.json();
            
            systemLocales[name] = langJson[CURRENT_LANG] || langJson['zh-TW'];

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlText;

            tempDiv.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (systemLocales[name][key]) {
                    el.textContent = systemLocales[name][key];
                }
            });

            tempDiv.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (systemLocales[name][key]) {
                    el.setAttribute('placeholder', systemLocales[name][key]);
                }
            });

            document.querySelector(rootSelector).innerHTML = tempDiv.innerHTML;
        }

        function getLocaleText(component, key, replacements = {}) {
            let text = (systemLocales[component] && systemLocales[component][key]) ? systemLocales[component][key] : key;
            for (const [k, v] of Object.entries(replacements)) {
                text = text.replace(`{${k}}`, v);
            }
            return text;
        }

        function renderValidationDetails(extraData) {
            if (!extraData || typeof extraData !== 'object') {
                return `<div class="rounded-xl bg-slate-900 border border-slate-700 px-3 py-2 text-slate-200 text-xs">${String(extraData)}</div>`;
            }

            const rows = Object.entries(extraData).map(([key, value]) => {
                const displayValue = value === null ? 'null' : (typeof value === 'object' ? JSON.stringify(value) : String(value));
                return `
                    <div class="grid grid-cols-[140px_1fr] gap-x-3 py-1 border-b border-slate-800/70 last:border-b-0">
                        <div class="text-slate-400 text-[11px] uppercase tracking-[0.12em]">${key}</div>
                        <div class="text-slate-100 text-xs break-words">${displayValue}</div>
                    </div>
                `;
            }).join('');

            return `<div class="rounded-2xl bg-slate-900/80 border border-slate-700 p-3 text-xs space-y-1">${rows}</div>`;
        }

        // 切換語系：重新載入所有組件並重新渲染表單/列表
        async function changeLanguage(lang) {
            if (!lang) return;
            CURRENT_LANG = lang;
            try {
                try { localStorage.setItem('stockassure_lang', lang); } catch(e) {}
                await Promise.all([
                    loadComponent('header', '#header-root'),
                    loadComponent('tree_section', '#tree-section-root'),
                    loadComponent('form_section', '#form-section-root'),
                    loadComponent('list_section', '#list-section-root')
                ]);

                // 更新語系選單狀態（header 已被重載，重新取回）
                const langEl = document.getElementById('lang-selector');
                if (langEl) langEl.value = CURRENT_LANG;

                // 重新渲染表單與資料
                renderDynamicForm();
                await fetchTree();
                await fetchObjects();
            } catch (err) {
                console.error('語系切換失敗:', err);
            }
            // 強制整頁重新整理以保證所有靜態資源與元件完全切換語系
            try {
                window.location.reload();
            } catch (e) {
                // fallback: navigate to same URL
                window.location.href = window.location.pathname;
            }
        }

        // [READ] 獲取外掛模板定義 (API 已移除 v1)
        async function fetchTemplates() {
            const res = await fetch('/api/templates');
            if (res.ok) {
                const data = await res.json();
                templatesMeta = data.templates;
                const selector = document.getElementById('template-selector');
                if (selector) {
                    selector.innerHTML = '';
                    Object.keys(templatesMeta).forEach(key => {
                        const opt = document.createElement('option');
                        opt.value = key;
                        opt.textContent = key;
                        selector.appendChild(opt);
                    });
                    renderDynamicForm();
                }
            }
        }

        // 動態表單渲染器
        function switchFormTab(tabName) {
            const locationTab = document.getElementById('form-tab-location');
            const objectTab = document.getElementById('form-tab-object');
            const locationBtn = document.getElementById('form-tab-location-btn');
            const objectBtn = document.getElementById('form-tab-object-btn');

            if (!locationTab || !objectTab || !locationBtn || !objectBtn) return;

            if (tabName === 'location') {
                locationTab.classList.remove('hidden');
                objectTab.classList.add('hidden');
                locationBtn.classList.add('bg-cyan-500/15', 'text-slate-100');
                locationBtn.classList.remove('text-slate-300');
                objectBtn.classList.remove('bg-cyan-500/15', 'text-slate-100');
                objectBtn.classList.add('text-slate-300');
            } else {
                objectTab.classList.remove('hidden');
                locationTab.classList.add('hidden');
                objectBtn.classList.add('bg-cyan-500/15', 'text-slate-100');
                objectBtn.classList.remove('text-slate-300');
                locationBtn.classList.remove('bg-cyan-500/15', 'text-slate-100');
                locationBtn.classList.add('text-slate-300');
            }
        }

        function renderDynamicForm() {
            const selector = document.getElementById('template-selector');
            const container = document.getElementById('dynamic-form-fields');
            if (!selector || !container) return;

            const tName = selector.value;
            const schema = templatesMeta[tName]?.schema;
            container.innerHTML = '';
            if (!schema || !schema.properties) return;

            const requiredFields = schema.required || [];

            for (const [field, prop] of Object.entries(schema.properties)) {
                const wrap = document.createElement('div');
                wrap.className = "flex flex-col gap-2 text-xs";

                const isRequired = requiredFields.includes(field);
                const label = document.createElement('label');
                label.className = "text-slate-400 font-medium";
                label.innerHTML = `${field} ${isRequired ? '<span class="text-red-500">*</span>' : ''}`;
                wrap.appendChild(label);

                let hint = prop.default !== undefined ? getLocaleText('form_section', 'default_hint', {default: prop.default}) : '';

                if (prop.enum) {
                    const sel = document.createElement('select');
                    sel.name = field;
                    sel.className = "bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-white text-sm";
                    
                    const defOpt = document.createElement('option');
                    defOpt.value = "";
                    defOpt.textContent = getLocaleText('form_section', 'select_default') + ` ${hint}`;
                    sel.appendChild(defOpt);

                    prop.enum.forEach(v => {
                        const o = document.createElement('option');
                        o.value = v;
                        o.textContent = v;
                        sel.appendChild(o);
                    });
                    wrap.appendChild(sel);
                } else {
                    const input = document.createElement('input');
                    input.name = field;
                    input.type = prop.type === 'number' || prop.type === 'integer' ? 'number' : 'text';
                    input.placeholder = prop.type + ` ${hint}`;
                    input.className = "bg-slate-900 border border-slate-700 rounded-xl px-3 py-3 text-white text-sm focus:outline-none focus:border-cyan-500";
                    wrap.appendChild(input);
                }
                container.appendChild(wrap);
            }
        }

        // [READ] 獲取空間樹狀圖 (高相容性結構校驗修正版)
        async function fetchTree() {
            try {
                const res = await fetch('/api/locations/tree-view');
                if (!res.ok) {
                    console.error("無法獲取空間樹數據:", res.status);
                    return;
                }
                const data = await res.json();
                
                // 🌟 自動向下相容：優先尋找內部組件容器，若不存在則直接渲染至外層根節點
                let container = document.getElementById('tree-container');
                if (!container) {
                    container = document.getElementById('tree-section-root');
                }
                
                if (!container) {
                    setTimeout(fetchTree, 50);
                    return;
                }
                container.innerHTML = '';

                function renderNode(node, depth = 0) {
                    const row = document.createElement('div');
                    row.className = `flex items-center justify-between group p-1.5 rounded-lg hover:bg-slate-800/40 cursor-pointer transition text-sm`;
                    row.style.paddingLeft = `${depth * 1.25 + 0.5}rem`;
                    
                    row.onclick = (e) => {
                        if (e.target.closest('button')) return;
                        container.querySelectorAll('.bg-slate-800').forEach(el => {
                            el.classList.remove('bg-slate-800', 'border-l-2', 'border-cyan-400');
                        });
                        row.classList.add('bg-slate-800', 'border-l-2', 'border-cyan-400');
                        selectLocation(node.id, node.name);
                    };

                    const left = document.createElement('div');
                    left.className = "flex items-center gap-2 truncate";
                    left.innerHTML = `<span class="text-slate-500 font-mono text-xs">[ID:${node.id}]</span> 📁 <span class="text-slate-200">${node.name}</span>`;
                    
                    const right = document.createElement('div');
                    right.className = "flex items-center gap-2 flex-shrink-0";
                    
                    // 語系安全防禦
                    let suffix = "件";
                    try {
                        suffix = getLocaleText('tree_section', 'item_suffix');
                        if (suffix === 'item_suffix') suffix = "件"; 
                    } catch(e) {
                        suffix = "件";
                    }

                    const countBadge = document.createElement('span');
                    // 確保數字徽章完全不折行
                    countBadge.className = `text-xs px-2 py-0.5 rounded-full font-mono whitespace-nowrap ${node.object_count > 0 ? 'bg-cyan-500/10 text-cyan-400' : 'bg-slate-800 text-slate-500'}`;
                    countBadge.textContent = `${node.object_count} ${suffix}`;
                    right.appendChild(countBadge);

                            const editBtn = document.createElement('button');
                            editBtn.className = "text-xs text-slate-500 hover:text-amber-400 opacity-0 group-hover:opacity-100 transition px-1";
                            editBtn.innerHTML = "✏️";
                            editBtn.onclick = (e) => {
                                e.stopPropagation();
                                enterLocationEditMode(node.id, node.name, node.parent_id);
                            };
                            right.appendChild(editBtn);

                            const delBtn = document.createElement('button');
                            delBtn.className = "text-xs text-red-400 hover:text-red-300 opacity-0 group-hover:opacity-100 transition px-1";
                            delBtn.innerHTML = "🗑️";
                            delBtn.onclick = (e) => {
                                e.stopPropagation();
                                if (!confirm(getLocaleText('tree_section', 'confirm_delete') || '確定要刪除此儲物空間嗎？')) return;
                                deleteLocation(node.id);
                            };
                            right.appendChild(delBtn);

                    row.appendChild(left);
                    row.appendChild(right);
                    container.appendChild(row);

                    if (node.children && node.children.length > 0) {
                        node.children.forEach(child => renderNode(child, depth + 1));
                    }
                }

                if (data.length === 0) {
                    container.innerHTML = `<p class="text-slate-500 italic p-2">暫無空間架構數據</p>`;
                } else {
                    data.forEach(rootNode => renderNode(rootNode, 0));
                }
            } catch (err) {
                console.error("❌ 渲染空間樹失敗:", err);
            }
        }

        function selectLocation(id, name) {
            currentSelectedLocationId = id;
            const titleEl = document.getElementById('list-title');
            if (titleEl) {
                titleEl.textContent = getLocaleText('list_section', 'dynamic_table_title', {name: name});
            }
            fetchObjects();
        }

        // [READ] 獲取右下物資清單表格
        async function fetchObjects() {
            if (!currentSelectedLocationId) return;
            const res = await fetch(`/api/objects/by-location/${currentSelectedLocationId}?recursive=true`);
            const tbody = document.getElementById('object-table-body');
            if (!tbody) return;
            tbody.innerHTML = '';

            if (!res.ok) return;
            const list = await res.json();

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-6 text-center text-slate-500 italic">${getLocaleText('list_section', 'space_empty')}</td></tr>`;
                return;
            }

            list.forEach(obj => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-900/30 transition";
                
                tr.innerHTML = `
                    <td class="py-3 font-medium text-slate-200 align-top">${obj.name}</td>
                    <td class="py-3 font-mono text-xs text-slate-400 align-top"><span class="bg-slate-800 px-2 py-0.5 rounded border border-slate-700/60">${obj.template_type}</span></td>
                    <td class="py-3 align-top">${renderValidationDetails(obj.extra_data)}</td>
                    <td class="py-3 text-right space-x-2 align-top">
                        <button onclick="enterObjectEditMode('${obj.id}', '${obj.name}', '${obj.template_type}', '${window.btoa(encodeURIComponent(JSON.stringify(obj.extra_data)))}')" class="text-xs text-cyan-400 hover:bg-cyan-500/10 px-2 py-1 rounded transition">${getLocaleText('list_section', 'btn_edit')}</button>
                        <button onclick="deleteObject('${obj.id}')" class="text-xs text-red-400 hover:bg-red-500/10 px-2 py-1 rounded transition">${getLocaleText('list_section', 'btn_delete')}</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // [CREATE / UPDATE] 空間庫存樹節點提交 
        async function submitLocation() {
            const nameInput = document.getElementById('new-loc-name');
            const parentInput = document.getElementById('new-loc-parent-id');
            const editingIdInput = document.getElementById('editing-location-id');
            
            if (!nameInput.value.trim()) {
                alert(getLocaleText('form_section', 'err_no_loc_name'));
                return;
            }

            const isEditMode = editingIdInput.value !== "";
            let url = '/api/locations/';
            let method = 'POST';
            
            const payload = {
                name: nameInput.value.trim(),
                parent_id: (currentSelectedLocationId || null)
            };

            if (isEditMode) {
                const locId = editingIdInput.value;
                url = `/api/locations/${locId}`;
                method = 'PUT';
                payload.parent_id = parentInput.value.trim() ? parseInt(parentInput.value.trim()) : null;
            }

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert(isEditMode 
                    ? getLocaleText('form_section', 'msg_loc_move_success', {name: payload.name})
                    : getLocaleText('form_section', 'msg_loc_create_success', {name: payload.name})
                );
                nameInput.value = '';
                cancelLocationEditMode();
                await fetchTree();
            } else {
                const err = await res.json();
                alert(`Error: ${JSON.stringify(err.detail)}`);
            }
            // 強制整頁重新整理
            try {
                window.location.reload();
            } catch (e) {
                // fallback: navigate to same URL
                window.location.href = window.location.pathname;
            }
        }

        // [CREATE / UPDATE] 物資強校驗提交 (API 已移除 v1)
        async function submitObject() {
            if (!currentSelectedLocationId) {
                alert("請先點擊選擇左側一個儲物空間，再執行物資登記入庫！");
                return;
            }

            const nameInput = document.getElementById('new-obj-name');
            const selector = document.getElementById('template-selector');
            const editingIdInput = document.getElementById('editing-object-id');
            
            if (!nameInput.value.trim()) {
                alert(getLocaleText('form_section', 'err_no_obj_name'));
                return;
            }

            const isEditMode = editingIdInput.value !== "";
            const extraData = {};
            document.querySelectorAll('#dynamic-form-fields input, #dynamic-form-fields select').forEach(input => {
                if (input.value !== "") {
                    extraData[input.name] = input.type === 'number' ? parseFloat(input.value) : input.value;
                }
            });

            const payload = {
                name: nameInput.value.trim(),
                location_id: currentSelectedLocationId,
                template_type: selector.value,
                extra_data: extraData
            };

            let url = '/api/objects/';
            let method = 'POST';

            if (isEditMode) {
                url = `/api/objects/${editingIdInput.value}`;
                method = 'PUT';
            }

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert(isEditMode ? getLocaleText('form_section', 'msg_obj_update_success') : getLocaleText('form_section', 'msg_obj_create_success'));
                nameInput.value = '';
                cancelEditMode();
                await fetchTree();
                await fetchObjects();
            } else {
                const err = await res.json();
                alert(`❌ 補全校驗失敗 (422/500):\n${JSON.stringify(err.detail)}`);
            }
        }

        // [DELETE] 物資刪除 (API 已移除 v1)
        async function deleteObject(id) {
            if (!confirm(getLocaleText('list_section', 'confirm_delete'))) return;
            const res = await fetch(`/api/objects/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert(getLocaleText('list_section', 'msg_delete_success'));
                await fetchTree();
                await fetchObjects();
            }
        }

        // [DELETE] 儲物空間刪除
        async function deleteLocation(id) {
            const res = await fetch(`/api/locations/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert('儲物空間已刪除');
                await fetchTree();
                // 若目前檢視的物件屬於該空間，清空物件列表
                if (currentSelectedLocationId === id) {
                    currentSelectedLocationId = null;
                    const tbody = document.getElementById('object-table-body');
                    if (tbody) tbody.innerHTML = '';
                }
            } else {
                const err = await res.json();
                alert(`無法刪除儲物空間: ${JSON.stringify(err.detail)}`);
            }
        }

        function enterLocationEditMode(id, name, parentId) {
            switchFormTab('location');
            document.getElementById('editing-location-id').value = id;
            document.getElementById('new-loc-name').value = name;
            document.getElementById('new-loc-parent-id').value = parentId || "";
            if(document.getElementById('loc-parent-wrapper')) document.getElementById('loc-parent-wrapper').classList.remove('hidden');
            if(document.getElementById('loc-cancel-btn')) document.getElementById('loc-cancel-btn').classList.remove('hidden');
            
            const titleEl = document.getElementById('loc-form-title');
            if(titleEl) titleEl.textContent = getLocaleText('form_section', 'loc_edit_title', {id: id});
            if(document.getElementById('loc-submit-btn')) document.getElementById('loc-submit-btn').textContent = getLocaleText('form_section', 'loc_btn_save');
        }

        function cancelLocationEditMode() {
            document.getElementById('editing-location-id').value = "";
            document.getElementById('new-loc-name').value = "";
            document.getElementById('new-loc-parent-id').value = "";
            if(document.getElementById('loc-parent-wrapper')) document.getElementById('loc-parent-wrapper').classList.add('hidden');
            if(document.getElementById('loc-cancel-btn')) document.getElementById('loc-cancel-btn').classList.add('hidden');
            
            if(document.getElementById('loc-form-title')) document.getElementById('loc-form-title').textContent = getLocaleText('form_section', 'loc_add_title');
            if(document.getElementById('loc-submit-btn')) document.getElementById('loc-submit-btn').textContent = getLocaleText('form_section', 'loc_btn_create');
        }

        function enterObjectEditMode(id, name, templateType, extraDataB64) {
            switchFormTab('object');
            document.getElementById('editing-object-id').value = id;
            document.getElementById('new-obj-name').value = name;
            document.getElementById('template-selector').value = templateType;
            document.getElementById('template-selector').disabled = true;
            
            renderDynamicForm();

            const extraData = JSON.parse(decodeURIComponent(window.atob(extraDataB64)));
            setTimeout(() => {
                document.querySelectorAll('#dynamic-form-fields input, #dynamic-form-fields select').forEach(input => {
                    if (extraData[input.name] !== undefined) {
                        input.value = extraData[input.name];
                    }
                });
            }, 50);

            if(document.getElementById('form-action-title')) document.getElementById('form-action-title').textContent = getLocaleText('form_section', 'obj_edit_title', {id: id});
            if(document.getElementById('submit-btn')) document.getElementById('submit-btn').textContent = getLocaleText('form_section', 'obj_btn_update');
            if(document.getElementById('cancel-edit-btn')) document.getElementById('cancel-edit-btn').classList.remove('hidden');
        }

        function cancelEditMode() {
            document.getElementById('editing-object-id').value = "";
            document.getElementById('new-obj-name').value = "";
            document.getElementById('template-selector').disabled = false;
            renderDynamicForm();

            if(document.getElementById('form-action-title')) document.getElementById('form-action-title').textContent = getLocaleText('form_section', 'obj_add_title');
            if(document.getElementById('submit-btn')) document.getElementById('submit-btn').textContent = getLocaleText('form_section', 'obj_btn_save');
            if(document.getElementById('cancel-edit-btn')) document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        window.addEventListener('DOMContentLoaded', () => {
            switchFormTab('location');
            initSystem();
        });
    </script>
</body>
</html>
